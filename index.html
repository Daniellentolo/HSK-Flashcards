<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e1014">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HSK">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32">
<title>HSK Flashcards</title>
<style>
  :root{
    --tone1:#E9C517; /* yellow */
    --tone2:#2E9E4B; /* green */
    --tone3:#8B3FB0; /* purple */
    --tone4:#D7303B; /* red */
    --tone5:#2A7CD8; /* blue */
    --bg:#0e1014; --panel:#161a21; --panel2:#1e232d; --text:#f1f2f4; --muted:#8a93a0; --border:#262d38;
    --accent:#4f8cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue","PingFang SC","Noto Sans CJK SC",sans-serif;
    -webkit-font-smoothing:antialiased;}
  .wrap{min-height:100%;display:flex;flex-direction:column}
  header{display:flex;justify-content:space-between;align-items:center;padding:14px 22px;border-bottom:1px solid var(--border);gap:14px;flex-wrap:wrap}
  header h1{font-size:17px;margin:0;letter-spacing:.3px;font-weight:600}
  header h1 .dot{color:var(--accent)}
  .ctrls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select,button{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;transition:all .15s}
  select:hover,button:hover{background:var(--panel2);border-color:#3a4555}
  button.primary{background:var(--accent);border-color:var(--accent);color:white}
  button.primary:hover{filter:brightness(1.1)}
  button.ghost{background:transparent}
  .stats{font-size:12px;color:var(--muted);padding:4px 8px}
  .stats span{color:var(--text);font-weight:600;margin:0 2px}

  .main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;overflow:auto}
  .card-area{width:100%;max-width:620px;}
  .card{
    position:relative;background:linear-gradient(180deg,#1b2029 0%,#14181f 100%);
    border:1px solid var(--border);border-radius:20px;padding:36px 30px 28px;min-height:360px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
  }
  .hanzi{font-family:"PingFang SC","Noto Sans CJK SC","Hiragino Sans GB","Microsoft YaHei",serif;
    font-size:clamp(72px,15vw,150px);font-weight:700;line-height:1;letter-spacing:6px;text-align:center}
  .hanzi .c{display:inline-block;padding:0 4px;}
  .t1{color:var(--tone1)} .t2{color:var(--tone2)} .t3{color:var(--tone3)} .t4{color:var(--tone4)} .t5{color:var(--tone5)}
  .audio-btn{background:var(--panel2);border:1px solid var(--border);color:var(--text);
    width:52px;height:52px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    font-size:22px;cursor:pointer;transition:all .15s}
  .audio-btn:hover{background:var(--accent);border-color:var(--accent)}
  .audio-btn.playing{background:var(--accent);border-color:var(--accent);transform:scale(1.05)}

  .meaning{text-align:center;margin-top:6px}
  .emoji-big{font-size:56px;line-height:1;margin-bottom:6px}
  .user-img{max-width:220px;max-height:220px;border-radius:12px;margin:0 auto 8px;display:block;box-shadow:0 4px 20px rgba(0,0,0,.3)}
  .img-ctrls{display:flex;gap:6px;justify-content:center;margin-top:4px;flex-wrap:wrap}
  .img-ctrls button{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--panel2);color:var(--muted)}
  .img-ctrls button:hover{color:var(--text)}
  .gloss{font-size:17px;color:#e5e7eb;font-weight:500;letter-spacing:.2px}
  .sentence{margin-top:10px;font-family:"PingFang SC","Noto Sans CJK SC",serif;font-size:24px;letter-spacing:2px;
    color:#f7f8fa;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;line-height:1.5;
    text-align:center;}
  .sentence .sc{display:inline-block}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:10px}

  .actions{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .actions .reveal{background:var(--accent);border-color:var(--accent);color:white;padding:12px 34px;font-size:15px;border-radius:12px;font-weight:600;letter-spacing:.3px}
  .grade-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;width:100%;max-width:520px;}
  .grade{padding:12px 4px;border-radius:12px;font-size:13px;font-weight:600;letter-spacing:.3px;display:flex;flex-direction:column;gap:2px;align-items:center;border:1px solid var(--border);background:var(--panel)}
  .grade .k{font-size:10px;color:var(--muted);font-weight:400}
  .grade.again{color:#ff6b7a} .grade.hard{color:#ffb347} .grade.good{color:#7fd18c} .grade.easy{color:#6cb5ff}
  .grade:hover{filter:brightness(1.15)}
  .bar{height:4px;background:var(--panel2);border-radius:2px;overflow:hidden;margin-top:4px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--tone1),var(--tone2),var(--tone3),var(--tone4),var(--tone5));width:0%;transition:width .3s}

  .welcome{text-align:center;padding:40px 20px;max-width:520px}
  .welcome h2{font-size:28px;margin:0 0 8px;letter-spacing:.5px}
  .welcome p{color:var(--muted);margin:10px 0}
  .level-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));gap:10px;margin:24px 0}
  .level-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 8px;cursor:pointer;transition:all .15s;text-align:center}
  .level-card:hover{border-color:var(--accent)}
  .level-card.selected{background:rgba(79,140,255,.12);border-color:var(--accent)}
  .level-card .label{font-weight:700;font-size:15px}
  .level-card .count{color:var(--muted);font-size:11px;margin-top:4px}
  .start-btn{padding:14px 30px;font-size:15px;border-radius:12px;font-weight:600;background:var(--accent);border-color:var(--accent);color:white}

  .legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:4px}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty h3{color:var(--text)}

  footer{padding:10px 22px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px}
  .kbd{background:var(--panel2);border:1px solid var(--border);padding:1px 6px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,monospace;font-size:10px;color:#cbd5e1}

  @media (max-width:600px){
    .level-grid{grid-template-columns:repeat(auto-fit, minmax(100px, 1fr))}
    .grade-row{grid-template-columns:repeat(4,1fr)}
    .sentence{font-size:20px}
  }
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>HSK <span class="dot">•</span> Flashcards</h1>
  <div class="ctrls">
    <div class="stats" id="stats"></div>
    <button class="ghost" id="restartBtn" title="Change deck" style="display:none">⚙︎ Deck</button>
    <button class="ghost" id="exportImgBtn" title="Download all your pictures as a backup file">↥ Export pics</button>
    <button class="ghost" id="importImgBtn" title="Load pictures from a backup file">↧ Import pics</button>
    <input type="file" id="importImgFile" accept="application/json,.json" style="display:none">
    <button class="ghost" id="resetBtn" title="Reset all progress">⟲ Reset</button>
  </div>
</header>

<div class="main">
  <div class="card-area" id="cardArea"><!-- rendered by JS --></div>
</div>

<footer>
  <div>
    Tones: <span style="color:var(--tone1)">1st</span> ·
    <span style="color:var(--tone2)">2nd</span> ·
    <span style="color:var(--tone3)">3rd</span> ·
    <span style="color:var(--tone4)">4th</span> ·
    <span style="color:var(--tone5)">neutral</span>
  </div>
  <div>
    <span class="kbd">Space</span> flip/play ·
    <span class="kbd">1-4</span> grade ·
    <span class="kbd">R</span> replay
  </div>
</footer>
</div>

<audio id="player" preload="none"></audio>

/* === APP === */
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const cardArea = $("#cardArea");
  const player = $("#player");
  const statsEl = $("#stats");
  const resetBtn = $("#resetBtn");
  const restartBtn = $("#restartBtn");

  const TONE_CLASS = {1:"t1",2:"t2",3:"t3",4:"t4",5:"t5"};
  const STATE_KEY = "hsk_srs_v1";
  const SETTINGS_KEY = "hsk_settings_v1";
  const IMG_KEY = "hsk_imgs_v1";

  // SRS state per card: {id: {due: ts, interval_days, ease, reps}}
  function loadState(){ try{return JSON.parse(localStorage.getItem(STATE_KEY))||{}}catch(e){return {}} }
  function saveState(s){ localStorage.setItem(STATE_KEY, JSON.stringify(s)); }
  function loadSettings(){ try{return JSON.parse(localStorage.getItem(SETTINGS_KEY))||{levels:["hsk1"]}}catch(e){return {levels:["hsk1"]}} }
  function saveSettings(s){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

  // User-uploaded pictures: {id: dataURL}
  function loadImgs(){ try{return JSON.parse(localStorage.getItem(IMG_KEY))||{}}catch(e){return {}} }
  function saveImgs(m){
    try{ localStorage.setItem(IMG_KEY, JSON.stringify(m)); return true; }
    catch(e){
      alert("Storage is full. Export your pictures, then reset progress to free space, or remove some images.");
      return false;
    }
  }

  const state = loadState();
  let settings = loadSettings();
  const imgs = loadImgs();
  let session = {queue:[], idx:0, current:null, showBack:false, sessionSize:20};

  // ---- Card rendering helpers ----
  function renderHanzi(hanzi, tones){
    const chars = Array.from(hanzi);
    return chars.map((c,i) => {
      const t = tones[i] || 5;
      return `<span class="c ${TONE_CLASS[t]||"t5"}">${escapeHtml(c)}</span>`;
    }).join("");
  }
  function renderSentence(text){
    // Color each CJK char by its tone (look up via quick per-char tone table), fall back neutral.
    // Simpler: render text with per-char coloring using DATA index by character if available; else plain
    const out = [];
    for (const c of Array.from(text)){
      if (/[\u4e00-\u9fff]/.test(c)){
        const t = CHAR_TONE.get(c) || 5;
        out.push(`<span class="sc ${TONE_CLASS[t]}">${escapeHtml(c)}</span>`);
      } else {
        out.push(`<span class="sc" style="color:#cbd5e1">${escapeHtml(c)}</span>`);
      }
    }
    return out.join("");
  }
  function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}

  // Build a char->tone map from DATA (uses first syllable tone per char where available)
  const CHAR_TONE = new Map();
  (function buildCharTone(){
    for (const w of DATA){
      const chars = Array.from(w.hanzi);
      for (let i=0;i<chars.length;i++){
        const c = chars[i], t = w.tones[i];
        if (!CHAR_TONE.has(c) && t) CHAR_TONE.set(c, t);
      }
    }
  })();

  // ---- Deck & queue ----
  function buildDeck(){
    const pool = DATA.filter(w => settings.levels.includes(w.level));
    // pick due/new cards: due first, then new ones, shuffled within buckets
    const now = Date.now();
    const due = [], fresh = [];
    for (const w of pool){
      const s = state[w.id];
      if (s && s.due && s.due <= now) due.push(w);
      else if (!s) fresh.push(w);
    }
    shuffle(due); shuffle(fresh);
    // cap session at 40 but keep queue open
    return [...due, ...fresh].slice(0, 80);
  }
  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}; return a; }

  function countPool(){
    const pool = DATA.filter(w => settings.levels.includes(w.level));
    const now = Date.now();
    let due=0, learned=0, fresh=0;
    for (const w of pool){
      const s = state[w.id];
      if (!s) fresh++;
      else if (s.due && s.due <= now) due++;
      else learned++;
    }
    return {total:pool.length, due, learned, fresh};
  }

  function updateStats(){
    const c = countPool();
    statsEl.innerHTML = `<span>${c.due}</span> due · <span>${c.learned}</span> learned · <span>${c.fresh}</span> new`;
  }

  // ---- Welcome / level select ----
  function renderWelcome(){
    const counts = {hsk1:0,hsk2:0,hsk3:0,measure:0,grammar:0};
    for (const w of DATA) counts[w.level]=(counts[w.level]||0)+1;
    const sel = new Set(settings.levels);
    cardArea.innerHTML = `
      <div class="welcome">
        <h2>HSK Flashcards</h2>
        <p>Tone-colored characters · native audio · spaced repetition</p>
        <div class="level-grid">
          <div class="level-card ${sel.has("hsk1")?"selected":""}" data-lv="hsk1"><div class="label">HSK 1</div><div class="count">${counts.hsk1} words</div></div>
          <div class="level-card ${sel.has("hsk2")?"selected":""}" data-lv="hsk2"><div class="label">HSK 2</div><div class="count">${counts.hsk2} words</div></div>
          <div class="level-card ${sel.has("hsk3")?"selected":""}" data-lv="hsk3"><div class="label">HSK 3</div><div class="count">${counts.hsk3} words</div></div>
          <div class="level-card ${sel.has("measure")?"selected":""}" data-lv="measure"><div class="label">量词</div><div class="count">${counts.measure} measure</div></div>
          <div class="level-card ${sel.has("grammar")?"selected":""}" data-lv="grammar"><div class="label">语法</div><div class="count">${counts.grammar} grammar</div></div>
        </div>
        <div><button class="start-btn" id="startBtn">Start studying</button></div>
        <div class="legend">
          <span><i style="background:var(--tone1)"></i>Tone 1 (flat)</span>
          <span><i style="background:var(--tone2)"></i>Tone 2 (rising)</span>
          <span><i style="background:var(--tone3)"></i>Tone 3 (dip)</span>
          <span><i style="background:var(--tone4)"></i>Tone 4 (falling)</span>
          <span><i style="background:var(--tone5)"></i>Neutral</span>
        </div>
      </div>`;
    cardArea.querySelectorAll(".level-card").forEach(el => {
      el.addEventListener("click",()=>{
        const lv = el.dataset.lv;
        if (sel.has(lv)) sel.delete(lv); else sel.add(lv);
        if (sel.size===0) sel.add(lv); // at least one
        settings.levels = Array.from(sel);
        saveSettings(settings);
        renderWelcome();
      });
    });
    cardArea.querySelector("#startBtn").addEventListener("click",startSession);
    restartBtn.style.display="none";
    updateStats();
  }

  function startSession(){
    session.queue = buildDeck();
    session.idx = 0;
    session.showBack = false;
    restartBtn.style.display="";
    if (session.queue.length===0){
      cardArea.innerHTML = `<div class="empty"><h3>🎉 No cards due</h3><p>All words in the selected levels are scheduled for a later time. Come back later or pick another level.</p><div style="margin-top:18px"><button class="start-btn" onclick="location.reload()">Back</button></div></div>`;
      return;
    }
    renderCard();
  }

  // ---- Card view ----
  function renderCard(){
    const w = session.queue[session.idx];
    session.current = w;
    const audioBtn = w.path
      ? `<button class="audio-btn" id="playBtn" title="Play audio">▶︎</button>`
      : `<div class="note" style="margin-top:0">${w.level==="grammar"?"grammar pattern":"measure word"}</div>`;
    const front = `<div class="hanzi">${renderHanzi(w.hanzi, w.tones)}</div>
                   ${audioBtn}`;
    let back = "";
    if (session.showBack){
      const userImg = imgs[w.id];
      const imgBlock = userImg
        ? `<img class="user-img" src="${userImg}" alt="">`
        : (w.emoji ? `<div class="emoji-big">${w.emoji}</div>` : "");
      const ctrls = userImg
        ? `<button id="changeImgBtn">Change pic</button><button id="removeImgBtn">Remove</button>`
        : `<button id="addImgBtn">📷 Add picture</button>`;
      back = `
        <div class="meaning">
          ${imgBlock}
          <div class="gloss">${escapeHtml(w.gloss||"")}</div>
          <div class="img-ctrls">${ctrls}</div>
        </div>
        <div class="sentence">${renderSentence(w.sentence||"")}</div>
        <input type="file" id="imgFileInput" accept="image/*" style="display:none">
      `;
    }
    const bar = progressBar();
    cardArea.innerHTML = `
      <div class="card">
        ${front}
        ${back}
        <div class="actions" id="actions"></div>
        <div class="bar"><i style="width:${bar}%"></i></div>
        <div class="note">${session.idx+1} / ${session.queue.length} in session · ${w.level.toUpperCase()}</div>
      </div>
    `;
    const playBtn = document.getElementById("playBtn");
    if (playBtn) playBtn.addEventListener("click",()=>playAudio(w));
    // Image controls (only present on the back)
    const fileInput = document.getElementById("imgFileInput");
    const pickImg = ()=> fileInput && fileInput.click();
    if (document.getElementById("addImgBtn")) document.getElementById("addImgBtn").addEventListener("click",pickImg);
    if (document.getElementById("changeImgBtn")) document.getElementById("changeImgBtn").addEventListener("click",pickImg);
    if (document.getElementById("removeImgBtn")) document.getElementById("removeImgBtn").addEventListener("click",()=>{
      delete imgs[w.id]; saveImgs(imgs); renderCard();
    });
    if (fileInput) fileInput.addEventListener("change",(ev)=>{
      const file = ev.target.files && ev.target.files[0];
      if (!file) return;
      compressImage(file, 256, 0.75).then(dataUrl=>{
        imgs[w.id] = dataUrl;
        if (saveImgs(imgs)) renderCard();
      }).catch(err=>{ alert("Couldn't load that image."); console.error(err); });
    });
    const actions = $("#actions");
    if (!session.showBack){
      actions.innerHTML = `<button class="reveal" id="revealBtn">Show answer</button>`;
      $("#revealBtn").addEventListener("click",flip);
    } else {
      actions.innerHTML = `
        <div class="grade-row">
          <button class="grade again" data-g="0"><div>Again</div><div class="k">&lt;1m</div></button>
          <button class="grade hard"  data-g="1"><div>Hard</div><div class="k">~10m</div></button>
          <button class="grade good"  data-g="2"><div>Good</div><div class="k" id="kGood">1d</div></button>
          <button class="grade easy"  data-g="3"><div>Easy</div><div class="k" id="kEasy">3d</div></button>
        </div>`;
      // preview intervals
      const s = state[w.id] || {interval:0,ease:2.5,reps:0};
      const goodI = s.reps===0 ? 1 : Math.max(1, Math.round(s.interval * s.ease));
      const easyI = Math.max(3, Math.round(goodI * 1.3));
      $("#kGood").textContent = humanD(goodI);
      $("#kEasy").textContent = humanD(easyI);
      actions.querySelectorAll(".grade").forEach(b=>{
        b.addEventListener("click", ()=>grade(parseInt(b.dataset.g)));
      });
    }
    // autoplay front (only if audio is available)
    if (!session.showBack && w.path) setTimeout(()=>playAudio(w),150);
  }

  function humanD(d){
    if (d<1) return "~"+Math.round(d*24)+"h";
    if (d<30) return d+"d";
    return Math.round(d/30)+"mo";
  }

  function progressBar(){
    const total = session.queue.length||1;
    return Math.round((session.idx/total)*100);
  }

  function flip(){ session.showBack = true; renderCard(); }
  function nextCard(){
    session.idx++;
    if (session.idx >= session.queue.length){
      cardArea.innerHTML = `<div class="empty"><h3>🎉 Session complete!</h3><p>You studied ${session.queue.length} cards.</p><div style="margin-top:18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap"><button class="start-btn" id="doMore">Study more</button><button class="reveal" id="doBack">Back to menu</button></div></div>`;
      $("#doMore").addEventListener("click",startSession);
      $("#doBack").addEventListener("click",renderWelcome);
      updateStats();
      return;
    }
    session.showBack = false;
    renderCard();
  }

  function grade(g){
    const w = session.current;
    const now = Date.now();
    const DAY = 86400000;
    let s = state[w.id] || {interval:0, ease:2.5, reps:0, due:now};
    if (g===0){ // again
      s.reps = 0; s.interval = 0; s.due = now + 60*1000; s.ease = Math.max(1.3, s.ease - 0.2);
    } else if (g===1){ // hard
      s.interval = Math.max(1/144, s.interval * 1.2 || 1/144); s.due = now + s.interval*DAY;
      s.ease = Math.max(1.3, s.ease - 0.15);
    } else if (g===2){ // good
      s.reps += 1;
      s.interval = s.reps===1 ? 1 : (s.reps===2 ? 3 : s.interval * s.ease);
      s.due = now + s.interval*DAY;
    } else { // easy
      s.reps += 1;
      s.interval = s.reps===1 ? 3 : (s.interval||1) * s.ease * 1.3;
      s.ease = s.ease + 0.05;
      s.due = now + s.interval*DAY;
    }
    state[w.id] = s; saveState(state);
    updateStats();
    nextCard();
  }

  // ---- Image upload helpers ----
  function compressImage(file, maxSize, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = ()=>{
          let {width, height} = img;
          if (width > height){
            if (width > maxSize){ height = Math.round(height*maxSize/width); width = maxSize; }
          } else {
            if (height > maxSize){ width = Math.round(width*maxSize/height); height = maxSize; }
          }
          const canvas = document.createElement("canvas");
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, width, height);
          try{
            resolve(canvas.toDataURL("image/jpeg", quality));
          }catch(err){ reject(err); }
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function exportImages(){
    const blob = new Blob([JSON.stringify(imgs)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const d = new Date();
    a.download = `hsk-pictures-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }
  function importImagesFromFile(file){
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const obj = JSON.parse(r.result);
        if (typeof obj !== "object" || Array.isArray(obj)) throw new Error("Bad format");
        let added = 0;
        for (const k in obj){ if (typeof obj[k]==="string"){ imgs[k] = obj[k]; added++; } }
        if (saveImgs(imgs)){
          alert(`Imported ${added} picture${added===1?"":"s"}.`);
          if (session.current) renderCard();
        }
      }catch(e){ alert("That doesn't look like a valid picture backup file."); }
    };
    r.readAsText(file);
  }

  function playAudio(w){
    try{
      player.src = encodeURI("./"+w.path);
      const btn = document.getElementById("playBtn");
      if (btn) btn.classList.add("playing");
      player.onended = ()=>{ if(btn) btn.classList.remove("playing"); };
      player.onerror = ()=>{ if(btn) btn.classList.remove("playing"); };
      player.play().catch(e=>{ if(btn) btn.classList.remove("playing"); });
    }catch(e){}
  }

  // ---- Keyboard ----
  document.addEventListener("keydown",(e)=>{
    if (!session.current) return;
    if (e.key===" " || e.key==="Enter"){
      e.preventDefault();
      if (!session.showBack) { flip(); }
      else { playAudio(session.current); }
    } else if (e.key==="r" || e.key==="R"){
      playAudio(session.current);
    } else if (session.showBack && ["1","2","3","4"].includes(e.key)){
      grade(parseInt(e.key)-1);
    }
  });

  // ---- Top controls ----
  $("#exportImgBtn").addEventListener("click",()=>{
    const n = Object.keys(imgs).length;
    if (n===0){ alert("You haven't added any pictures yet."); return; }
    exportImages();
  });
  $("#importImgBtn").addEventListener("click",()=>$("#importImgFile").click());
  $("#importImgFile").addEventListener("change",(e)=>{
    const f = e.target.files && e.target.files[0];
    if (f) importImagesFromFile(f);
    e.target.value = "";
  });

  resetBtn.addEventListener("click",()=>{
    if (!confirm("Reset ALL progress? This cannot be undone.")) return;
    localStorage.removeItem(STATE_KEY);
    for (const k in state) delete state[k];
    if (Object.keys(imgs).length > 0 && confirm("Also delete your uploaded pictures? (Tip: click Cancel to keep them.)")){
      localStorage.removeItem(IMG_KEY);
      for (const k in imgs) delete imgs[k];
    }
    updateStats();
    renderWelcome();
  });
  restartBtn.addEventListener("click",()=>{ renderWelcome(); });

  // Assign ids to data (stable)
  DATA.forEach((w,i)=>{ w.id = w.level+"_"+i; });

  // ---- Boot ----
  renderWelcome();
})();
// ---- Service worker registration (PWA) ----
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((err) => {
      console.warn("SW registration failed (fine over file://):", err);
    });
  });
}
</script>
</body>
</html>
